# SAP CPI Migration Scaffolder — Configuration
# Copy this file to settings.yaml and fill in your values.

environment: cf   # "cf" (Cloud Foundry / BTP) or "neo"

# ---------------------------------------------------------
# Cloud Foundry (BTP) — OAuth2 client credentials
# ---------------------------------------------------------
cf:
  base_url: "https://<tenant>.it-cpi018.cfapps.<region>.hana.ondemand.com"
  token_url: "https://<tenant>.authentication.<region>.hana.ondemand.com/oauth/token"
  client_id: "YOUR_CLIENT_ID"
  client_secret: "YOUR_CLIENT_SECRET"

# ---------------------------------------------------------
# Neo environment — Basic auth
# ---------------------------------------------------------
neo:
  base_url: "https://<tenant>.hci.<dc>.hana.ondemand.com"
  username: "YOUR_USERNAME"
  password: "YOUR_PASSWORD"

# ---------------------------------------------------------
# SAP PI/PO source system (ESR/Integration Directory REST API)
# ---------------------------------------------------------
pi:
  base_url: "http://<pi-host>:50000"
  username: "YOUR_PI_USER"
  password: "YOUR_PI_PASSWORD"
  # Alternatively, point to an exported PI/PO Excel/XML inventory:
  # export_file: "./pi_export.xlsx"

# ---------------------------------------------------------
# Destination targets  (comment out any you don't need)
# ---------------------------------------------------------
destinations:
  targets:
    - s4hana_cloud    # SAP S/4HANA Cloud (Public Edition)
    - s4hana_op       # SAP S/4HANA On-Premise
    - ariba           # SAP Ariba
    - successfactors  # SAP SuccessFactors
    - btp             # SAP BTP services
    # - fieldglass    # SAP Fieldglass
    # - concur        # SAP Concur

  # Hub API key (optional — get a free key at api.sap.com for higher rate limits)
  hub_api_key: ""

  # Cache settings
  cache_ttl_hours: 24        # how long Hub data stays fresh
  cache_dir: ""              # leave blank for ~/.cpi_migrator/cache/
  refresh_on_startup: true   # async-refresh stale packages at launch

# ---------------------------------------------------------
# Migration options
# ---------------------------------------------------------
migration:
  output_dir: "./output"
  default_sender_adapter: "HTTPS"    # fallback if not detectable
  default_receiver_adapter: "HTTPS"
  include_mapping_stubs: true        # scaffold empty message mapping steps
  complexity_thresholds:
    low:    { max_score: 10 }
    medium: { max_score: 25 }
    high:   { max_score: 999 }
  effort_days:
    low:    1
    medium: 3
    high:   8
